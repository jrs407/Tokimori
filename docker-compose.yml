services:
  frontend:
    container_name: tokimori-frontend
    build:
      context: ./Frontend/tokimori
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend/tokimori/src:/app/src
      - ./Frontend/tokimori/public:/app/public
      - ./Frontend/tokimori/index.html:/app/index.html
      - ./Frontend/tokimori/vite.config.ts:/app/vite.config.ts
      - ./Miscelanius/gameImage:/app/public/gameImage
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - db
      - auth-service
      - game-service
      - library-service
      - notes-service
      - objectives-service
    networks:
      - tokimori-network

  auth-service:
    container_name: tokimori-auth-service
    build:
      context: ./Backend/services/authenticationService
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Backend/services/authenticationService/src:/app/src
    environment:
      - NODE_ENV=development
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=tokimori
      - MYSQL_PORT=3306
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tokimori-network
    restart: always

  game-service:
    container_name: tokimori-game-service
    build:
      context: ./Backend/services/gameService
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./Backend/services/gameService/src:/app/src
      - ./Miscelanius/gameImage:/app/Miscelanius/gameImage
    environment:
      - NODE_ENV=development
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=tokimori
      - MYSQL_PORT=3306
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tokimori-network
    restart: always

  library-service:
    container_name: tokimori-library-service
    build:
      context: ./Backend/services/libraryService
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./Backend/services/libraryService/src:/app/src
    environment:
      - NODE_ENV=development
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=tokimori
      - MYSQL_PORT=3306
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tokimori-network
    restart: always

  notes-service:
    container_name: tokimori-notes-service
    build:
      context: ./Backend/services/notesService
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./Backend/services/notesService/src:/app/src
    environment:
      - NODE_ENV=development
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=tokimori
      - MYSQL_PORT=3306
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tokimori-network
    restart: always

  objectives-service:
    container_name: tokimori-objectives-service
    build:
      context: ./Backend/services/objectivesService
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    volumes:
      - ./Backend/services/objectivesService/src:/app/src
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=tokimori
      - MYSQL_PORT=3306
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tokimori-network
    restart: always

  session-service:
    container_name: tokimori-session-service
    build:
      context: ./Backend/services/sessionService
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    volumes:
      - ./Backend/services/sessionService/src:/app/src
    environment:
      - NODE_ENV=development
      - PORT=8005
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=tokimori
      - MYSQL_PORT=3306
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tokimori-network
    restart: always

  db:
    image: mysql:8.0
    container_name: tokimori-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: tokimori
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - tokimori-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

networks:
  tokimori-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
